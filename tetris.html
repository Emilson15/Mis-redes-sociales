<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Tetris Pro VZLA | SrRexGame</title>
    <style>
        :root { --amarillo: #FFD700; --azul: #0033A0; --rojo: #CE1126; }
        body { 
            margin: 0; background: #0f172a; color: #fff; 
            font-family: 'Inter', sans-serif; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; 
        }
        #game-wrap { position: relative; border: 4px solid var(--amarillo); border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { background: #000; display: block; }
        .stats { margin-bottom: 10px; font-size: 1.5rem; font-weight: bold; color: var(--amarillo); }
        .controls { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        button { padding: 15px; font-size: 1.2rem; border-radius: 10px; border: none; background: var(--azul); color: white; cursor: pointer; }
        .btn-down { grid-column: 2; background: var(--rojo); }
        .back-btn { position: absolute; top: 10px; left: 10px; background: var(--rojo); padding: 10px; text-decoration: none; color: white; border-radius: 5px; z-index: 100; }
        
        #menu-over {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ Volver</a>
    <div class="stats">Líneas: <span id="lines">0</span></div>
    
    <div id="game-wrap">
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>

    <div class="controls">
        <button onclick="playerMove(-1)">⬅</button>
        <button onclick="playerRotate(1)">🔄</button>
        <button onclick="playerMove(1)">➡</button>
        <button class="btn-down" onclick="playerDrop()">⬇</button>
    </div>

    <div id="menu-over">
        <h1 style="color:var(--rojo)">GAME OVER</h1>
        <button onclick="location.reload()" style="padding:15px 30px; border-radius:50px; background:var(--amarillo); border:none; font-weight:bold;">REINTENTAR</button>
        <br>
        <a href="index.html" style="color:white; text-decoration:none;">SALIR AL MENÚ</a>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const linesElement = document.getElementById('lines');

        context.scale(20, 20); // Cada unidad en el código serán 20px en el canvas

        // 1. Definición de las piezas (Tetrominos) con colores del tricolor
        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[1, 1], [1, 1]];
            if (type === 'Z') return [[2, 2, 0], [0, 2, 2], [0, 0, 0]];
            if (type === 'S') return [[0, 3, 3], [3, 3, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
        }

        const colors = [null, '#FFD700', '#0033A0', '#CE1126'];

        // 2. Crear el tablero (Matrix de 12x20)
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) { matrix.push(new Array(w).fill(0)); }
            return matrix;
        }

        // 3. Lógica de Colisión
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        // 4. Unir pieza al tablero y limpiar líneas
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
            linesElement.innerText = player.score;
        }

        // 5. Dibujado
        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.strokeStyle = '#000';
                        context.lineWidth = 0.05;
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        // 6. Movimientos del Jugador
        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) { player.pos.x -= dir; }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) { matrix.forEach(row => row.reverse()); } 
            else { matrix.reverse(); }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                document.getElementById('menu-over').style.display = 'flex';
                isPlaying = false;
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isPlaying = true;

        function update(time = 0) {
            if(!isPlaying) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) { playerDrop(); }
            draw();
            requestAnimationFrame(update);
        }

        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        // Controles de teclado
        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 81) playerRotate(-1);
            else if (event.keyCode === 87 || event.keyCode === 38) playerRotate(1);
        });

        playerReset();
        update();
    </script>
</body>
</html>
